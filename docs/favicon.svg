<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>wink</title>
  <rect width="32" height="32" rx="8" fill="#0e0e0e"/>
  <!-- three log streams converging into one point -->
  <line x1="4" y1="8"  x2="23" y2="16" stroke="#e8e8e8" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="4" y1="16" x2="23" y2="16" stroke="#e8e8e8" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="4" y1="24" x2="23" y2="16" stroke="#e8e8e8" stroke-width="2.2" stroke-linecap="round"/>
  <!-- the single collection point -->
  <circle cx="25" cy="16" r="4" fill="#34d399"/>
</svg>
