<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>wink</title>
  <rect width="32" height="32" rx="6" fill="#0e0e0e"/>
  <!-- W letterform -->
  <path d="M 5 7 L 11 24 L 16 14 L 21 24 L 27 7"
        fill="none" stroke="#e8e8e8" stroke-width="2.5"
